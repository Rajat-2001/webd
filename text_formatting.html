<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text formatting</title>
</head>
<body>
    <p>this is a <b>bold</b> text</p>
    <p>this is an <i>italic</i> text</p>
    <p>this is an <u>underline</u> text</p>
    <p>this is a <del>deleted</del> text</p>
    <p>this is a <big>big</big> text</p>
    <p>this is a <small>small</small> text</p>
    <p>this is a <sub>subscript</sub> text</p>
    <p>this is a <sup>superscript</sup> text</p>
    <p>this is a <mark style="background-color: lightgreen;">highlighted</mark> text</p>
</body>
</html>
